                <a href="products.html" class="text-slate-300 hover:text-teal-400 font-medium text-sm transition-colors duration-200">Products</a>
                <a href="about.html" class="text-slate-300 hover:text-teal-400 font-medium text-sm transition-colors duration-200">About Us</a>
                <a href="contact.html" class="text-slate-300 hover:text-teal-400 font-medium text-sm transition-colors duration-200">Contact</a>

        <input type="checkbox" id="mobile-toggle-login" class="peer hidden">

    <!-- ===== LOGIN FORM ===== -->
    <main class="flex-1 flex items-center justify-center py-12 px-4 bg-slate-900">
        <div class="w-full max-w-md bg-slate-800 border border-slate-700 rounded-xl p-8 md:p-10 shadow-lg shadow-slate-900/50">
            
            <div class="flex flex-col items-center mb-8">
                <div class="w-12 h-12 bg-gradient-to-br from-teal-400 to-teal-500 rounded-xl flex items-center justify-center font-serif font-extrabold text-2xl text-slate-900 shadow-md shadow-teal-400/20 mb-4">E</div>
                <h1 class="font-serif font-bold text-2xl text-white mb-1">Welcome Back</h1>
                <p class="text-slate-400 text-sm">Login to your EAZEIT account</p>
            </div>

            <form id="login-form" action="index.html" method="GET" class="flex flex-col gap-5">
                
                <div class="flex flex-col gap-1.5">
                    <label for="login-email" class="text-xs font-semibold text-slate-300 uppercase tracking-wider">Email Address</label>
                    <input type="email" id="login-email" name="email" placeholder="Enter your email address" required class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg text-white placeholder-slate-400 text-sm focus:outline-none focus:border-teal-400 transition-colors">
                </div>

                <div class="flex flex-col gap-1.5">
                    <label for="login-password" class="text-xs font-semibold text-slate-300 uppercase tracking-wider">Password</label>
                    <div class="relative">
                        <input type="password" id="login-password" name="password" placeholder="Enter your password" required class="w-full px-4 py-3 pr-10 bg-slate-800 border border-slate-700 rounded-lg text-white placeholder-slate-400 text-sm focus:outline-none focus:border-teal-400 transition-colors">
                        <button type="button" id="toggle-login-password" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-teal-400 transition-colors">
                            <svg id="eye-icon-login" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="text-right">
                    <a href="forgot-password.html" class="text-xs font-medium text-teal-400 hover:underline">Forgot your password?</a>
                </div>

                <button type="submit" class="w-full mt-2 bg-teal-400 hover:bg-teal-500 text-slate-900 font-bold text-sm px-6 py-3.5 rounded-lg transition-all duration-200 active:scale-95 shadow-lg shadow-teal-400/20">Login to Account</button>
            </form>

            <div class="mt-8 pt-6 border-t border-slate-700/60 flex flex-col items-center gap-3 text-sm text-slate-400">
                <span>Do not have an account? <a href="signup.html" class="text-teal-400 hover:underline font-semibold">Create one here</a></span>
                <a href="index.html" class="text-slate-300 hover:text-white transition-colors">Back to Home</a>
            </div>

        </div>
    </main>

    <!-- ===== FOOTER ===== -->

            <div class="flex gap-6 order-1 md:order-2">
                <a href="privacy.html" class="hover:text-teal-400 transition-colors">Privacy</a>
                <a href="terms.html" class="hover:text-teal-400 transition-colors">Terms</a>
                <a href="contact.html" class="hover:text-teal-400 transition-colors">Support</a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
    <script>
        // -------------------------------------------------------------
        // DOM Element Selectors (Getting elements we need)
        // -------------------------------------------------------------
        const loginForm = document.getElementById('login-form');
        const emailInput = document.getElementById('login-email');
        const passwordInput = document.getElementById('login-password');
        const togglePasswordBtn = document.getElementById('toggle-login-password');

        // SVG graphics for Eye and Eye-crossed visual states
        const eyeSVG = `
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
        `;
        const eyeOffSVG = `
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
            </svg>
        `;

        // -------------------------------------------------------------
        // 1. Password Eye Toggle click event (Toggle password visibility)
        // -------------------------------------------------------------
        togglePasswordBtn.addEventListener('click', function() {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                togglePasswordBtn.innerHTML = eyeOffSVG;
            } else {
                passwordInput.type = 'password';
                togglePasswordBtn.innerHTML = eyeSVG;
            }
        });

        // -------------------------------------------------------------
        // 2. Submit form event (Authenticate against Local Storage)
        // -------------------------------------------------------------
        loginForm.addEventListener('submit', function(event) {
            // Prevent standard form reload behavior
            event.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            // Check if user is logging in as an administrator
            const isAdmin = email.toLowerCase().includes('admin');

            // Admin bypass routing (matching existing design)
            if (isAdmin) {
                // Set an admin session inside sessionStorage
                const adminUser = {
                    firstName: "Admin",
                    lastName: "User",
                    email: email,
                    countryCode: "+91",
                    mobile: "9999999999"
                };
                sessionStorage.setItem('eazeit_active_user', JSON.stringify(adminUser));
                
                showToast('Admin login successful! Redirecting to Admin Panel...', 'success');
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 1200);
                return;
            }

            // A. Retrieve the array of registered users from the browser's persistent localStorage
            const usersDatabase = JSON.parse(localStorage.getItem('eazeit_users')) || [];

            // B. Find a user record whose email matches the email typed in the input field
            const matchedUser = usersDatabase.find(function(user) {
                return user.email.toLowerCase() === email.toLowerCase();
            });

            // C. Validate if the user exists and the password entered is correct
            if (matchedUser && matchedUser.password === password) {
                // Successful Auth: Initialize their session in sessionStorage for isolation
                sessionStorage.setItem('eazeit_active_user', JSON.stringify(matchedUser));
                
                showToast(`Login successful! Welcome back, ${matchedUser.firstName}.`, 'success');
                
                // Redirect back to homepage
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1200);
            } else {
                // Failed Auth: Display a red error toast and clear password input
                showToast('Invalid Email Address or Password. Please try again.', 'error');
                passwordInput.value = '';
                passwordInput.focus();
            }
        });
    </script>
</body>
